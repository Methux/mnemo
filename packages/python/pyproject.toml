[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mnemo-memory"
version = "0.1.1"
description = "Python SDK for Mnemo — AI memory that forgets intelligently"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
authors = [{name = "Mnemo Contributors"}]
keywords = ["ai-memory", "long-term-memory", "vector-search", "agent-memory", "rag"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["mnemo"]

[project.urls]
Homepage = "https://m-nemo.ai"
Documentation = "https://docs.m-nemo.ai"
Repository = "https://github.com/Methux/mnemo"
Issues = "https://github.com/Methux/mnemo/issues"
