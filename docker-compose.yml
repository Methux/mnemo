version: "3.8"

# ============================================================================
# Mnemo - One-Click Deployment
# ============================================================================
# Brings up all services needed for the Mnemo memory system:
#   - neo4j:           Graph database for knowledge graph storage
#   - graphiti:        Python FastAPI service bridging Neo4j (entity extraction + search)
#   - mnemo-dashboard: Web dashboard for inspecting memory state
#
# LanceDB is embedded (no separate service), but gets a named volume for persistence.
#
# Usage:
#   cp .env.example .env   # fill in your API keys
#   docker compose up -d
# ============================================================================

services:

  # --------------------------------------------------------------------------
  # Neo4j - Graph Database
  # --------------------------------------------------------------------------
  # Stores entities, relationships, and temporal edges for the knowledge graph.
  # Web console: http://localhost:7474
  # Bolt protocol: bolt://localhost:7687
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.26-community
    container_name: mnemo-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-mnemo-dev}
      - NEO4J_PLUGINS=["apoc"]
      # Performance tuning
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Graphiti Service - Knowledge Graph Bridge
  # --------------------------------------------------------------------------
  # FastAPI microservice that wraps graphiti-core:
  #   - POST /episodes    Write conversation episodes (auto entity extraction)
  #   - POST /search      Temporal-aware semantic search
  #   - POST /spread      Spreading activation (associative recall)
  #   - POST /facts/expire  Mark facts as expired
  #   - GET  /health      Health check
  #
  # Port: 18799
  # --------------------------------------------------------------------------
  graphiti:
    build:
      context: ./services/graphiti
      dockerfile: Dockerfile
    container_name: mnemo-graphiti
    ports:
      - "${GRAPHITI_PORT:-18799}:18799"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-mnemo-dev}
      - GRAPHITI_PORT=18799
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:18799/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Mnemo Dashboard - Web UI
  # --------------------------------------------------------------------------
  # Web interface for inspecting memory state, browsing the knowledge graph,
  # and monitoring system health.
  #
  # Port: 18800
  # --------------------------------------------------------------------------
  mnemo-dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
    container_name: mnemo-dashboard
    ports:
      - "${DASHBOARD_PORT:-18800}:18800"
    environment:
      - GRAPHITI_URL=http://graphiti:18799
      - NEO4J_BROWSER_URL=http://neo4j:7474
      - PORT=18800
    depends_on:
      neo4j:
        condition: service_healthy
      graphiti:
        condition: service_healthy
    restart: unless-stopped

# ============================================================================
# Named Volumes
# ============================================================================
volumes:
  # Neo4j graph data
  neo4j-data:
    name: mnemo-neo4j-data

  # Neo4j logs
  neo4j-logs:
    name: mnemo-neo4j-logs

  # LanceDB embedded vector storage (used by host-side mnemo plugin, mounted if needed)
  lancedb-data:
    name: mnemo-lancedb-data
