version: "3.8"

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: mnemo-neo4j
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/mnemo-dev
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
    restart: unless-stopped

volumes:
  neo4j-data:
