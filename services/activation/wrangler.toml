name = "mnemo-activation"
main = "worker.js"
compatibility_date = "2024-12-01"

# KV namespace for license storage
[[kv_namespaces]]
binding = "LICENSES"
id = "your-kv-namespace-id"          # Replace after: wrangler kv namespace create LICENSES
preview_id = "your-preview-kv-id"    # Replace after: wrangler kv namespace create LICENSES --preview

# Secrets (set via: wrangler secret put <NAME>)
# SIGNING_PRIVATE_KEY  — Ed25519 private key base64 (from ~/.mnemo-private-key)
# LEMONSQUEEZY_SECRET  — From LemonSqueezy webhook settings
# RESEND_API_KEY       — From resend.com dashboard

[vars]
ENVIRONMENT = "production"
